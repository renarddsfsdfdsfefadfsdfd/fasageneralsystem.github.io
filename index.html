<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASA GENERAL SYSTEM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* FASA专属深蓝色背景渐变 */
        body {
            background: linear-gradient(120deg, #0a192f, #112240, #1d3557);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            animation: pageFadeIn 1s ease-out forwards;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(10, 25, 47, 0.25);
            text-align: center;
            position: relative;
            overflow: hidden;
            transform: translateY(30px);
            opacity: 0;
            animation: cardSlideIn 0.8s ease-out 0.3s forwards;
        }

        /* 顶部装饰条：FASA深蓝主色调 */
        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #234e70, #3a6ea5);
            transform: translateX(-100%);
            animation: barSlideIn 0.6s ease-out 0.8s forwards;
        }

        .login-title {
            font-size: 26px;
            color: #0a192f;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transform: translateY(20px);
            opacity: 0;
            animation: elementFadeIn 0.5s ease-out 1s forwards;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 20px;
            transform: translateY(20px);
            opacity: 0;
            animation: elementFadeIn 0.5s ease-out 1.1s forwards;
        }

        /* 新增：用户信息展示区域 */
        .user-info {
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.4s ease;
            display: none;
        }

        .user-info.show {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            border: 3px solid #3a6ea5;
            object-fit: cover;
            box-shadow: 0 4px 12px rgba(58, 110, 165, 0.2);
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #0a192f;
            margin-bottom: 4px;
        }

        .user-position {
            font-size: 13px;
            color: #6c757d;
        }

        .input-group {
            margin-bottom: 28px;
            text-align: left;
            transform: translateY(20px);
            opacity: 0;
        }
        .input-group:nth-child(4) { animation: elementFadeIn 0.5s ease-out 1.2s forwards; }
        .input-group:nth-child(5) { animation: elementFadeIn 0.5s ease-out 1.3s forwards; }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #212529;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            height: 50px;
            padding: 0 18px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* 输入框聚焦：深蓝高亮 */
        .form-input:focus {
            border-color: #3a6ea5;
            box-shadow: 0 0 0 3px rgba(58, 110, 165, 0.15);
        }

        .user-select {
            appearance: none;
            background: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='%233a6ea5' viewBox='0 0 16 16'%3E%3Cpath d='M8 11l4-4H4l4 4z'/%3E%3C/svg%3E") no-repeat right 18px center;
            background-size: 16px;
        }

        /* 登录按钮：FASA深蓝主色调 */
        .login-btn {
            width: 100%;
            height: 52px;
            background: #234e70;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 1px;
            transform: translateY(20px);
            opacity: 0;
            animation: elementFadeIn 0.5s ease-out 1.4s forwards;
        }

        .login-btn:hover {
            background: #3a6ea5;
            box-shadow: 0 5px 15px rgba(58, 110, 165, 0.3);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .tip {
            margin-top: 22px;
            font-size: 13px;
            color: #868e96;
            line-height: 1.5;
            transform: translateY(20px);
            opacity: 0;
            animation: elementFadeIn 0.5s ease-out 1.5s forwards;
        }

        .result-tip {
            margin-top: 20px;
            font-size: 15px;
            font-weight: 600;
            height: 22px;
            transition: all 0.3s ease;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        /* ==================== 动画定义 ==================== */
        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes cardSlideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes barSlideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        @keyframes elementFadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">FASA GENERAL SYSTEM</div>
        <div class="login-subtitle"></div>

        <!-- 新增：用户头像与职位展示区 -->
        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" src="" alt="User Avatar">
            <div class="user-name" id="userName"></div>
            <div class="user-position" id="userPosition"></div>
        </div>

        <div class="input-group">
            <label>Login User</label>
            <select class="form-input user-select" id="userSelect" onchange="showUserInfo()">
                <option value="">Please select a login user</option>
                <option value="p">Huang Pengrong</option>
                <option value="y">Zhang Yaolin</option>
                <option value="j">Zhang Jiajun</option>
            </select>
        </div>

        <div class="input-group">
            <label>Dynamic Login Password</label>
            <input type="number" class="form-input" id="password" placeholder="Please enter the generated dynamic password">
        </div>

        <button class="login-btn" onclick="checkLogin()">Login to System</button>
        
        <div class="result-tip" id="result"></div>
        <div class="tip"></div>
    </div>

    <script>
        // 扩展用户信息：包含姓名、职位、头像URL（使用在线占位图服务，可替换为真实图片）
        const userMap = {
            'p': {
                name: 'Huang Pengrong',
                position: 'System Administrator',
                avatar: 'https://ui-avatars.com/api/?name=HP&background=234e70&color=fff&size=128'
            },
            'y': {
                name: 'Zhang Yaolin',
                position: 'Senior Engineer',
                avatar: 'https://ui-avatars.com/api/?name=ZY&background=3a6ea5&color=fff&size=128'
            },
            'j': {
                name: 'Zhang Jiajun',
                position: 'Project Manager',
                avatar: 'https://ui-avatars.com/api/?name=ZJ&background=1d3557&color=fff&size=128'
            }
        };

        // 新增：选择用户后显示头像和职位
        function showUserInfo() {
            const userKey = document.getElementById('userSelect').value;
            const userInfoDom = document.getElementById('userInfo');
            const avatarDom = document.getElementById('userAvatar');
            const nameDom = document.getElementById('userName');
            const positionDom = document.getElementById('userPosition');

            if (userKey && userMap[userKey]) {
                const user = userMap[userKey];
                avatarDom.src = user.avatar;
                nameDom.textContent = user.name;
                positionDom.textContent = user.position;
                userInfoDom.classList.add('show');
            } else {
                userInfoDom.classList.remove('show');
            }
        }

        // Get UTC+8 real-time time
        function getCSTTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const cst = new Date(utc + (8 * 3600000));
            
            return {
                year: cst.getFullYear(),
                month: cst.getMonth() + 1,
                day: cst.getDate(),
                hour: cst.getHours(),
                minute: cst.getMinutes()
            };
        }

        function checkLogin() {
            const userKey = document.getElementById('userSelect').value;
            const inputPwd = document.getElementById('password').value.trim();
            const resultDom = document.getElementById('result');

            if (!userKey) {
                resultDom.className = 'result-tip error';
                resultDom.textContent = 'Please select a login user!';
                return;
            }
            if (!inputPwd) {
                resultDom.className = 'result-tip error';
                resultDom.textContent = 'Please enter the dynamic password!';
                return;
            }

            const time = getCSTTime();
            // Password generated by addition based on UTC+8 time
            const standardPwd = (time.year * 10086) + 
                               (time.month * 10086) + 
                               (time.day * 1006) + 
                               (time.hour * 10086) + 
                               (time.minute * 10086);

            if (Number(inputPwd) === standardPwd) {
                resultDom.className = 'result-tip success';
                resultDom.textContent = `Welcome ${userMap[userKey].name} to FASA GENERAL SYSTEM!`;
            } else {
                resultDom.className = 'result-tip error';
                resultDom.textContent = 'Incorrect password, please re-enter!';
            }
        }
    </script>
</body>
</html>
